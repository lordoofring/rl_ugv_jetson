robot:
  type: "mock" # Options: "mock", "real"
  wheel_base: 0.15 # Meters (approximate for Jetson UGV)
  wheel_radius: 0.03 # Meters (approximate)
  max_speed: 0.5 # m/s
  turn_wheel_speed: 0.3 # m/s per wheel during in-place turns — raise if motors won't spin
  turn_time_90: 1 # seconds to complete a 90-degree turn — tweak until turns are accurate

env:
  grid_size: 10
  cell_size: 0.5 # The physical size of one grid square in meters. Change this to match your real-world tiles (e.g. 0.6).
  pixels_per_cell: 60 # Visual size on screen (pixels). Decrease if map doesn't fit on screen.
  max_steps: 100

vision:
  enabled: false          # set true to use ArUco localizer on real robot
  camera_index: 0         # /dev/video0 (or GStreamer pipeline string)
  marker_map_path: "marker_map.json"
  marker_size: 0.05       # printed marker side-length in meters
  aruco_dict: "DICT_4X4_50"

training:
  total_timesteps: 100000
  learning_rate: 0.0003
  batch_size: 64
